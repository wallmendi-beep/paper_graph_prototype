<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Logic Graph</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="control-panel">
      <div class="panel-header">
        <p class="eyebrow">Integrated NLP Pipeline</p>
        <h1 id="app-title">Document Logic Graph</h1>
        <p id="app-intro" class="intro"></p>
      </div>

      <section class="panel-card source-card">
        <h2>Document Input</h2>
        <label class="field">
          <span>Upload File</span>
          <input id="document-file" type="file" accept=".pdf,.doc,.docx,.txt,.md,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/plain">
        </label>
        <label class="field">
          <span>Google Docs URL</span>
          <input id="google-docs-url" type="url" placeholder="https://docs.google.com/document/d/...">
        </label>
        <div class="action-row">
          <button id="load-docs-button" type="button" class="secondary">Load Docs</button>
        </div>
        <p class="source-meta">Current source: <strong id="source-meta">Manual text</strong></p>
        <p id="status-bar" class="status-bar" data-tone="muted"></p>
      </section>

      <label class="field">
        <span>Document Text</span>
        <textarea id="paper-input" spellcheck="false"></textarea>
      </label>

      <div class="action-row">
        <button id="analyze-button" type="button">Run Full Analysis</button>
        <button id="load-sample-button" type="button" class="secondary">Load Sample</button>
      </div>

      <section class="panel-card">
        <h2>Review Tools</h2>
        <label class="field">
          <span>Graph Search</span>
          <input id="graph-search" type="search" placeholder="Search sentences, concepts, or link reasons">
        </label>
        <div class="action-row">
          <button id="clear-search-button" type="button" class="secondary">Clear Search</button>
          <label class="toggle-pill">
            <input id="contradictions-only" type="checkbox">
            <span>Show Contradictions Only</span>
          </label>
        </div>
        <div class="nav-row">
          <button id="nav-back-button" type="button" class="secondary">Previous Node</button>
          <button id="nav-forward-button" type="button" class="secondary">Next Node</button>
        </div>
        <p id="graph-summary" class="source-meta">Showing the full graph.</p>
      </section>

      <section class="panel-card">
        <h2>Analysis Summary</h2>
        <dl id="stats-panel" class="stats-grid"></dl>
      </section>

      <section class="panel-card">
        <h2>Selected Node Context</h2>
        <div id="context-panel" class="context-panel"></div>
      </section>

      <section class="panel-card">
        <h2>Logic Review Results</h2>
        <div id="issues-panel" class="context-panel"></div>
      </section>
    </aside>

    <main class="visualization-panel">
      <div class="viz-header">
        <div>
          <p class="eyebrow">D3 Radial View</p>
          <h2>Sentence-Concept Links and Contradiction Graph</h2>
        </div>
        <div class="legend">
          <span><i class="legend-dot sentence"></i> Sentence</span>
          <span><i class="legend-dot token"></i> Token</span>
          <span><i class="legend-dot bridge"></i> Strong Link</span>
          <span><i class="legend-dot contradiction"></i> Contradiction</span>
        </div>
      </div>
      <div id="graph-root" class="graph-root"></div>
    </main>
  </div>

  <script type="module">
    import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.3.136/build/pdf.min.mjs";
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.3.136/build/pdf.worker.min.mjs";
    window.pdfjsLib = pdfjsLib;
  </script>
  <script src="https://unpkg.com/mammoth@1.8.0/mammoth.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
